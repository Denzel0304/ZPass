<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="icon" href="favicon.png">
  
<title>Z Pass</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy:#1a3a5c; --navy-mid:#1e4a7a; --navy-light:#2a5fa0;
    --navy-pale:#d6e8f7; --navy-surface:#e8f1fa;
    --accent:#3b82c4; --accent-bright:#5b9fd4; --gold:#c8a84b;
    --text-primary:#0d1f35; --text-secondary:#4a6080; --text-muted:#7a95b0;
    --surface:#f0f6fc; --surface-card:#ffffff;
    --border:rgba(26,58,92,0.15); --border-strong:rgba(26,58,92,0.3);
    --danger:#c0392b; --danger-light:#fdecea; --success:#1a7a4a;
    --shadow-sm:0 2px 8px rgba(26,58,92,0.1);
    --shadow-md:0 4px 20px rgba(26,58,92,0.18);
    --shadow-lg:0 8px 40px rgba(26,58,92,0.25);
    --radius:14px; --radius-sm:8px; --radius-lg:20px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html {
    height:100%; overflow:hidden; overscroll-behavior:none;
  }

  body {
    height:100%; overflow:hidden; overscroll-behavior:none;
    font-family:-apple-system,'Pretendard','Apple SD Gothic Neo',BlinkMacSystemFont,sans-serif;
    background:var(--surface); color:var(--text-primary);
    max-width:480px; margin:0 auto;
  }

  #vault_root {
    height:100%; display:flex; flex-direction:column;
    overflow:hidden; position:relative;
  }

  /* ── AUTH ── */
  #vault_auth_screen {
    flex:1; overflow-y:auto; overscroll-behavior:contain;
    background:linear-gradient(160deg,var(--navy) 0%,var(--navy-mid) 50%,#0d2a4a 100%);
    display:none; flex-direction:column;
    align-items:center; justify-content:center; padding:2rem;
  }

  .vault_auth_logo { margin-bottom:2rem; text-align:center; }
  .vault_auth_logo svg { filter:drop-shadow(0 4px 12px rgba(200,168,75,0.4)); }

  .vault_auth_title {
    color:#fff; font-size:26px; font-weight:700;
    letter-spacing:-0.5px; margin-top:1rem;
  }
  .vault_auth_sub {
    color:rgba(255,255,255,0.55); font-size:12px;
    margin-top:4px; letter-spacing:2px; text-transform:uppercase;
  }

  .vault_auth_card {
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:var(--radius-lg); padding:1.75rem;
    width:100%; max-width:360px; backdrop-filter:blur(12px);
  }

  .vault_field_label {
    color:rgba(255,255,255,0.7); font-size:12px; font-weight:600;
    letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; display:block;
  }

  .vault_input {
    width:100%; background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15); border-radius:var(--radius-sm);
    color:#fff; font-size:16px; padding:12px 14px; outline:none;
    transition:border-color 0.2s,background 0.2s; margin-bottom:1rem;
    -webkit-appearance:none;
  }
  .vault_input:focus { border-color:var(--accent-bright); background:rgba(255,255,255,0.12); }
  .vault_input::placeholder { color:rgba(255,255,255,0.3); }

  .vault_input_wrap { position:relative; margin-bottom:1rem; }
  .vault_input_wrap .vault_input { margin-bottom:0; padding-right:44px; }

  .vault_eye_btn {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:rgba(255,255,255,0.5);
    cursor:pointer; padding:4px; display:flex; align-items:center;
  }

  .vault_btn_primary {
    width:100%; background:var(--gold); border:none;
    border-radius:var(--radius-sm); color:#1a1200;
    font-size:16px; font-weight:700; padding:14px; cursor:pointer;
    margin-top:0.5rem; transition:opacity 0.2s,transform 0.15s;
  }
  .vault_btn_primary:active { opacity:0.85; transform:scale(0.98); }

  .vault_auth_error {
    background:rgba(192,57,43,0.2); border:1px solid rgba(192,57,43,0.4);
    border-radius:var(--radius-sm); color:#ffb3ab; font-size:13px;
    padding:10px 12px; margin-top:0.75rem; text-align:center; display:none;
  }

  /* ── APP ── */
  #vault_app_screen {
    display:none; flex-direction:column;
    height:100%; overflow:hidden;
  }

  .vault_topnav {
    background:var(--navy); padding:0 12px;
    display:flex; align-items:center; gap:8px;
    flex-shrink:0; box-shadow:var(--shadow-sm); height:56px;
  }

  .vault_nav_safe_btn {
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:var(--radius-sm); color:rgba(255,255,255,0.9);
    cursor:pointer; padding:7px 12px;
    display:flex; align-items:center; gap:6px;
    flex-shrink:0; transition:background 0.15s;
    font-size:13px; font-weight:600; white-space:nowrap;
  }
  .vault_nav_safe_btn:active { background:rgba(255,255,255,0.18); }
  .vault_nav_safe_btn svg { width:18px; height:18px; flex-shrink:0; }

  .vault_search_wrap { flex:1; position:relative; min-width:0; }

  .vault_search_input {
    width:100%; background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.15); border-radius:20px;
    color:#fff; font-size:14px; padding:7px 14px 7px 34px;
    outline:none; transition:background 0.2s,border-color 0.2s;
    -webkit-appearance:none;
  }
  .vault_search_input:focus { background:rgba(255,255,255,0.15); border-color:var(--accent-bright); }
  .vault_search_input::placeholder { color:rgba(255,255,255,0.4); }

  .vault_search_icon {
    position:absolute; left:10px; top:50%; transform:translateY(-50%);
    color:rgba(255,255,255,0.45); pointer-events:none;
  }

  .vault_logout_btn {
    background:none; border:1px solid rgba(255,255,255,0.2);
    border-radius:var(--radius-sm); color:rgba(255,255,255,0.7);
    cursor:pointer; padding:6px 10px; font-size:12px; font-weight:600;
    transition:all 0.15s; flex-shrink:0; white-space:nowrap;
  }
  .vault_logout_btn:active { background:rgba(255,255,255,0.1); color:#fff; }

  .vault_sync_bar {
    background:var(--navy-surface); border-bottom:1px solid var(--border);
    padding:5px 16px; font-size:11px; color:var(--text-muted);
    display:flex; align-items:center; gap:6px; flex-shrink:0;
  }
  .vault_sync_dot { width:7px; height:7px; border-radius:50%; background:var(--success); flex-shrink:0; }
  .vault_sync_dot.pending { background:var(--gold); animation:pulse 1.2s infinite; }
  .vault_sync_dot.offline { background:var(--text-muted); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #vault_main_content {
    flex:1; overflow-y:auto; overscroll-behavior:contain;
    -webkit-overflow-scrolling:touch; padding:20px 16px 100px;
  }

  /* ── HOME ── */
  #vault_home_view { display:flex; flex-direction:column; align-items:center; padding-top:40px; }

  .vault_safe_wrap {
    position:relative; cursor:pointer;
    display:inline-block; transition:transform 0.2s;
  }
  .vault_safe_wrap:active { transform:scale(0.96); }

  .vault_count_badge {
    position:absolute; top:-8px; right:-8px;
    background:#e74c3c; color:#fff; font-size:12px; font-weight:700;
    min-width:22px; height:22px; border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    padding:0 5px; border:2px solid var(--surface);
    box-shadow:0 2px 6px rgba(231,76,60,0.4);
  }

  .vault_home_label { margin-top:1.5rem; font-size:18px; font-weight:700; color:var(--navy); }
  .vault_home_sub   { margin-top:6px; font-size:13px; color:var(--text-muted); }

  /* ── LIST ── */
  #vault_list_view { display:none; }

  .vault_list_header { display:flex; align-items:center; gap:10px; margin-bottom:16px; }

  .vault_back_btn {
    background:none; border:none; color:var(--navy);
    cursor:pointer; padding:4px; display:flex; align-items:center;
  }

  .vault_list_title { font-size:18px; font-weight:700; color:var(--navy); }

  .vault_list_count {
    margin-left:auto; font-size:13px; color:var(--text-muted);
    background:var(--navy-surface); padding:3px 10px; border-radius:12px;
  }

  .vault_item_card {
    background:var(--surface-card); border:1px solid var(--border);
    border-radius:var(--radius); padding:14px 16px; margin-bottom:10px;
    cursor:pointer; display:flex; align-items:center; gap:14px;
    transition:box-shadow 0.15s,transform 0.12s; box-shadow:var(--shadow-sm);
  }
  .vault_item_card:active { box-shadow:var(--shadow-md); transform:scale(0.99); }

  .vault_item_icon {
    width:42px; height:42px; border-radius:10px; background:var(--navy-surface);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; font-size:18px; font-weight:700; color:var(--navy-light);
  }

  .vault_item_info { flex:1; min-width:0; }

  .vault_item_name {
    font-size:15px; font-weight:600; color:var(--text-primary);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .vault_item_id {
    font-size:12px; color:var(--text-muted); margin-top:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .vault_item_arrow { color:var(--text-muted); flex-shrink:0; }

  .vault_add_fab {
    position:fixed; bottom:28px; right:20px;
    width:56px; height:56px; background:var(--navy);
    border:none; border-radius:50%; color:#fff; cursor:pointer;
    box-shadow:0 4px 16px rgba(26,58,92,0.45);
    display:flex; align-items:center; justify-content:center;
    z-index:90; transition:transform 0.15s,box-shadow 0.15s;
  }
  .vault_add_fab:active { transform:scale(0.92); }

  /* ── MODALS ── */
  .vault_modal_overlay {
    position:fixed; inset:0;
    background:rgba(10,20,40,0.55); backdrop-filter:blur(4px);
    z-index:200; display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.25s;
  }
  .vault_modal_overlay.open { opacity:1; pointer-events:all; }

  .vault_modal_sheet {
    background:var(--surface-card); border-radius:22px 22px 0 0;
    width:100%; max-width:480px; max-height:92vh;
    overflow-y:auto; overscroll-behavior:contain;
    transform:translateY(100%);
    transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
    padding-bottom:env(safe-area-inset-bottom,20px);
  }
  .vault_modal_overlay.open .vault_modal_sheet { transform:translateY(0); }

  .vault_modal_handle {
    width:40px; height:4px; background:var(--border-strong);
    border-radius:2px; margin:12px auto 0;
  }
  .vault_modal_header {
    padding:16px 20px 0; display:flex;
    align-items:center; justify-content:space-between;
  }
  .vault_modal_title { font-size:18px; font-weight:700; color:var(--navy); }

  .vault_modal_close {
    background:var(--surface); border:none; border-radius:50%;
    width:30px; height:30px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text-secondary); font-size:18px;
  }
  .vault_modal_close:active { background:var(--border); }
  .vault_modal_body { padding:16px 20px 24px; }

  /* ── FORM ── */
  .vault_form_group { margin-bottom:14px; }

  .vault_form_label {
    display:block; font-size:12px; font-weight:600; color:var(--text-secondary);
    letter-spacing:0.8px; text-transform:uppercase; margin-bottom:5px;
  }

  .vault_form_input {
    width:100%; background:var(--surface); border:1px solid var(--border-strong);
    border-radius:var(--radius-sm); color:var(--text-primary);
    font-size:15px; padding:11px 14px; outline:none;
    transition:border-color 0.2s; -webkit-appearance:none; font-family:inherit;
  }
  .vault_form_input:focus { border-color:var(--accent); }

  .vault_form_input_wrap { position:relative; }
  .vault_form_input_wrap .vault_form_input { padding-right:80px; }

  .vault_form_eye {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--text-muted);
    cursor:pointer; padding:4px; display:flex; align-items:center;
  }

  .vault_form_copy {
    position:absolute; right:44px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--text-muted);
    cursor:pointer; padding:4px; display:flex; align-items:center;
    transition:color 0.15s;
  }
  .vault_form_copy.copied { color:var(--success); }

  .vault_form_textarea {
    width:100%; background:var(--surface); border:1px solid var(--border-strong);
    border-radius:var(--radius-sm); color:var(--text-primary);
    font-size:15px; padding:11px 14px; outline:none; resize:none;
    min-height:80px; transition:border-color 0.2s;
    -webkit-appearance:none; font-family:inherit;
  }
  .vault_form_textarea:focus { border-color:var(--accent); }

  /* ── DETAIL ── */
  .vault_detail_field {
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:12px 14px; margin-bottom:10px;
  }
  .vault_detail_label {
    font-size:11px; font-weight:600; color:var(--text-muted);
    letter-spacing:0.8px; text-transform:uppercase; margin-bottom:3px;
  }
  .vault_detail_value { font-size:15px; color:var(--text-primary); word-break:break-all; }
  .vault_detail_value_wrap { display:flex; align-items:center; gap:8px; }
  .vault_detail_value_wrap .vault_detail_value { flex:1; }

  .vault_icon_btn {
    background:none; border:none; color:var(--text-muted);
    cursor:pointer; padding:4px; display:flex; align-items:center;
    border-radius:6px; transition:background 0.15s,color 0.15s; flex-shrink:0;
  }
  .vault_icon_btn:active { background:var(--border); color:var(--navy); }
  .vault_icon_btn.copied { color:var(--success); }

  .vault_detail_actions { display:flex; gap:10px; margin-top:20px; }

  .vault_btn_edit {
    flex:1; background:var(--navy-surface); border:1px solid var(--border-strong);
    border-radius:var(--radius-sm); color:var(--navy);
    font-size:14px; font-weight:600; padding:12px; cursor:pointer;
  }
  .vault_btn_edit:active { background:var(--navy-pale); }

  .vault_btn_delete {
    flex:1; background:var(--danger-light); border:1px solid rgba(192,57,43,0.2);
    border-radius:var(--radius-sm); color:var(--danger);
    font-size:14px; font-weight:600; padding:12px; cursor:pointer;
  }
  .vault_btn_delete:active { background:rgba(192,57,43,0.15); }

  /* ── GEN PW ── */
  .vault_gen_btn {
    background:var(--navy-surface); border:1px solid var(--border-strong);
    border-radius:var(--radius-sm); color:var(--navy);
    font-size:12px; font-weight:600; padding:7px 12px;
    cursor:pointer; margin-top:6px; transition:background 0.15s;
    display:inline-flex; align-items:center; gap:5px;
  }
  .vault_gen_btn:active { background:var(--navy-pale); }

  .vault_btn_save {
    width:100%; background:var(--navy); border:none;
    border-radius:var(--radius-sm); color:#fff;
    font-size:15px; font-weight:700; padding:14px; cursor:pointer;
    margin-top:8px; transition:opacity 0.2s,transform 0.15s;
  }
  .vault_btn_save:active { opacity:0.85; transform:scale(0.98); }
  .vault_btn_save:disabled { opacity:0.5; }

  /* ── CONFIRM ── */
  .vault_confirm_overlay {
    position:fixed; inset:0; background:rgba(10,20,40,0.65);
    z-index:400; display:flex; align-items:center; justify-content:center;
    padding:20px; opacity:0; pointer-events:none; transition:opacity 0.2s;
  }
  .vault_confirm_overlay.open { opacity:1; pointer-events:all; }

  .vault_confirm_box {
    background:var(--surface-card); border-radius:var(--radius);
    padding:24px 20px; width:100%; max-width:320px; text-align:center;
    transform:scale(0.92); transition:transform 0.2s; box-shadow:var(--shadow-lg);
  }
  .vault_confirm_overlay.open .vault_confirm_box { transform:scale(1); }

  .vault_confirm_title { font-size:17px; font-weight:700; color:var(--text-primary); margin-bottom:8px; }
  .vault_confirm_msg   { font-size:14px; color:var(--text-secondary); line-height:1.5; margin-bottom:20px; white-space:pre-line; }
  .vault_confirm_btns  { display:flex; gap:10px; }

  .vault_confirm_cancel {
    flex:1; background:var(--surface); border:1px solid var(--border-strong);
    border-radius:var(--radius-sm); color:var(--text-secondary);
    font-size:14px; font-weight:600; padding:12px; cursor:pointer;
  }

  .vault_confirm_ok {
    flex:1; background:var(--navy); border:none;
    border-radius:var(--radius-sm); color:#fff;
    font-size:14px; font-weight:700; padding:12px; cursor:pointer;
  }
  .vault_confirm_ok.is-danger { background:var(--danger); }

  /* ── TOAST ── */
  .vault_toast {
    position:fixed; bottom:90px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--navy); color:#fff; font-size:13px; font-weight:600;
    padding:10px 20px; border-radius:20px; z-index:500;
    opacity:0; transition:opacity 0.2s,transform 0.2s;
    white-space:nowrap; pointer-events:none; box-shadow:var(--shadow-md);
  }
  .vault_toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── MISC ── */
  .vault_empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
  .vault_empty svg { opacity:0.3; margin-bottom:12px; }
  .vault_empty p { font-size:14px; }
  .vault_no_results { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:14px; }
  .vault_pw_dots  { letter-spacing:3px; font-size:18px; }
  .vault_site_url { color:var(--accent); font-size:14px; text-decoration:none; word-break:break-all; }
</style>
</head>
<body>
<div id="vault_root">

<!-- ══ AUTH ══ -->
<div id="vault_auth_screen">
  <div class="vault_auth_logo">
    <svg width="80" height="80" viewBox="0 0 90 90" fill="none">
      <rect x="8" y="20" width="74" height="58" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(200,168,75,0.5)" stroke-width="1.5"/>
      <rect x="16" y="28" width="58" height="42" rx="7" fill="rgba(255,255,255,0.05)" stroke="rgba(200,168,75,0.3)" stroke-width="1"/>
      <path d="M30 10L30 28M60 10L60 28" stroke="rgba(200,168,75,0.6)" stroke-width="3" stroke-linecap="round"/>
      <circle cx="45" cy="46" r="10" fill="none" stroke="#c8a84b" stroke-width="2"/>
      <circle cx="45" cy="46" r="4" fill="#c8a84b"/>
      <rect x="43" y="52" width="4" height="8" rx="2" fill="#c8a84b"/>
      <circle cx="22" cy="49" r="3" fill="rgba(200,168,75,0.4)"/>
      <circle cx="68" cy="49" r="3" fill="rgba(200,168,75,0.4)"/>
    </svg>
    <div class="vault_auth_title">ZPassVault</div>
    <div class="vault_auth_sub">Secure Password Manager</div>
  </div>
  <div class="vault_auth_card">
    <label class="vault_field_label">이메일</label>
    <input class="vault_input" type="email" id="vault_email_input" placeholder="your@email.com" autocomplete="email" inputmode="email">
    <label class="vault_field_label">비밀번호</label>
    <div class="vault_input_wrap">
      <input class="vault_input" type="password" id="vault_pw_input" placeholder="••••••••" autocomplete="current-password">
      <button class="vault_eye_btn" id="vault_auth_eye" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button class="vault_btn_primary" id="vault_login_btn">금고 열기</button>
    <div class="vault_auth_error" id="vault_auth_error"></div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="vault_app_screen">
  <nav class="vault_topnav">
    <button class="vault_nav_safe_btn" id="vault_nav_safe_btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="12" cy="12" r="4"/>
        <path d="M12 8v1M12 15v1M8 12h1M15 12h1"/>
      </svg>
      금고
    </button>
    <div class="vault_search_wrap">
      <svg class="vault_search_icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="vault_search_input" type="search" id="vault_search_input" placeholder="검색..." autocomplete="off">
    </div>
    <button class="vault_logout_btn" id="vault_logout_btn">로그아웃</button>
  </nav>

  <div class="vault_sync_bar">
    <div class="vault_sync_dot" id="vault_sync_dot"></div>
    <span id="vault_sync_text">동기화됨</span>
  </div>

  <div id="vault_main_content">
    <div id="vault_home_view">
      <div class="vault_safe_wrap" id="vault_safe_icon_btn">
        <svg width="150" height="150" viewBox="0 0 160 160" fill="none">
          <rect x="12" y="28" width="136" height="110" rx="16" fill="#1e4a7a" stroke="#2a5fa0" stroke-width="2"/>
          <rect x="22" y="38" width="116" height="90" rx="10" fill="#1a3a5c" stroke="#3b82c4" stroke-width="1.5" stroke-opacity="0.5"/>
          <path d="M44 28L44 20Q44 12 52 12L108 12Q116 12 116 20L116 28" stroke="#2a5fa0" stroke-width="3" stroke-linecap="round" fill="none"/>
          <circle cx="80" cy="80" r="26" fill="#0d2a4a" stroke="#c8a84b" stroke-width="2"/>
          <circle cx="80" cy="80" r="16" fill="none" stroke="#3b82c4" stroke-width="1.5" stroke-opacity="0.4"/>
          <circle cx="80" cy="80" r="8" fill="#c8a84b"/>
          <rect x="77" y="86" width="6" height="14" rx="3" fill="#c8a84b"/>
          <circle cx="30" cy="83" r="6" fill="#0d2a4a" stroke="#3b82c4" stroke-width="1.5"/>
          <circle cx="130" cy="83" r="6" fill="#0d2a4a" stroke="#3b82c4" stroke-width="1.5"/>
        </svg>
        <div class="vault_count_badge" id="vault_count_badge">0</div>
      </div>
      <div class="vault_home_label">내 금고</div>
      <div class="vault_home_sub" id="vault_home_sub">탭하여 비밀번호 목록 열기</div>
    </div>

    <div id="vault_list_view">
      <div class="vault_list_header">
        <button class="vault_back_btn" id="vault_list_back_btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <span class="vault_list_title">금고</span>
        <span class="vault_list_count" id="vault_list_count">0개</span>
      </div>
      <div id="vault_items_container"></div>
    </div>
  </div>

  <button class="vault_add_fab" id="vault_add_fab">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>
</div>

</div><!-- #vault_root -->

<!-- ══ DETAIL MODAL ══ -->
<div class="vault_modal_overlay" id="vault_detail_modal">
  <div class="vault_modal_sheet">
    <div class="vault_modal_handle"></div>
    <div class="vault_modal_header">
      <span class="vault_modal_title" id="vault_detail_title">상세 정보</span>
      <button class="vault_modal_close" id="vault_detail_close">×</button>
    </div>
    <div class="vault_modal_body">
      <div class="vault_detail_field">
        <div class="vault_detail_label">사이트 이름</div>
        <div class="vault_detail_value" id="vault_d_site_name"></div>
      </div>
      <div class="vault_detail_field" id="vault_d_url_field">
        <div class="vault_detail_label">사이트 주소</div>
        <div class="vault_detail_value_wrap">
          <a class="vault_detail_value vault_site_url" id="vault_d_url" href="#" target="_blank"></a>
          <button class="vault_icon_btn" id="vault_d_url_copy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </div>
      <div class="vault_detail_field">
        <div class="vault_detail_label">아이디</div>
        <div class="vault_detail_value_wrap">
          <div class="vault_detail_value" id="vault_d_login_id"></div>
          <button class="vault_icon_btn" id="vault_d_id_copy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </div>
      <div class="vault_detail_field">
        <div class="vault_detail_label">비밀번호</div>
        <div class="vault_detail_value_wrap">
          <div class="vault_detail_value vault_pw_dots" id="vault_d_password">••••••••</div>
          <button class="vault_icon_btn" id="vault_d_pw_eye">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button class="vault_icon_btn" id="vault_d_pw_copy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </div>
      <div class="vault_detail_field" id="vault_d_memo_field">
        <div class="vault_detail_label">메모</div>
        <div class="vault_detail_value" id="vault_d_memo" style="white-space:pre-wrap;line-height:1.5;"></div>
      </div>
      <div class="vault_detail_actions">
        <button class="vault_btn_edit"   id="vault_detail_edit_btn">수정</button>
        <button class="vault_btn_delete" id="vault_detail_delete_btn">삭제</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ FORM MODAL ══ -->
<div class="vault_modal_overlay" id="vault_form_modal">
  <div class="vault_modal_sheet">
    <div class="vault_modal_handle"></div>
    <div class="vault_modal_header">
      <span class="vault_modal_title" id="vault_form_title">새 항목 추가</span>
      <button class="vault_modal_close" id="vault_form_close">×</button>
    </div>
    <div class="vault_modal_body">
      <div class="vault_form_group">
        <label class="vault_form_label">사이트 이름 *</label>
        <input class="vault_form_input" type="text" id="vault_f_site_name" placeholder="예: 구글, 네이버">
      </div>
      <div class="vault_form_group">
        <label class="vault_form_label">사이트 주소</label>
        <input class="vault_form_input" type="url" id="vault_f_url" placeholder="https://">
      </div>
      <div class="vault_form_group">
        <label class="vault_form_label">아이디 *</label>
        <div style="position:relative;">
          <input class="vault_form_input" type="text" id="vault_f_login_id" placeholder="아이디 또는 이메일" style="padding-right:44px;">
          <button class="vault_form_copy" id="vault_f_id_copy" style="right:10px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      </div>
      <div class="vault_form_group">
        <label class="vault_form_label">비밀번호 *</label>
        <div class="vault_form_input_wrap">
          <input class="vault_form_input" type="password" id="vault_f_password" placeholder="비밀번호">
          <button class="vault_form_copy" id="vault_f_pw_copy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="vault_form_eye" id="vault_f_pw_eye">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button class="vault_gen_btn" id="vault_gen_pw_btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          자동 생성 (16자리)
        </button>
        <div id="vault_gen_options" style="margin-top:8px;display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;">
          <label style="font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:6px;margin-bottom:6px;cursor:pointer;"><input type="checkbox" id="vault_opt_upper" checked> 대문자 포함</label>
          <label style="font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:6px;margin-bottom:6px;cursor:pointer;"><input type="checkbox" id="vault_opt_num"   checked> 숫자 포함</label>
          <label style="font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:6px;margin-bottom:6px;cursor:pointer;"><input type="checkbox" id="vault_opt_sym"   checked> 특수문자 포함 (!@#$%^&*)</label>
          <button class="vault_btn_save" id="vault_do_gen_btn" style="margin-top:4px;padding:10px;font-size:13px;">생성하기</button>
        </div>
      </div>
      <div class="vault_form_group">
        <label class="vault_form_label">메모</label>
        <textarea class="vault_form_textarea" id="vault_f_memo" placeholder="추가 메모 (선택)"></textarea>
      </div>
      <button class="vault_btn_save" id="vault_form_save_btn">저장</button>
    </div>
  </div>
</div>

<!-- ══ CONFIRM MODAL ══ -->
<div class="vault_confirm_overlay" id="vault_confirm_overlay">
  <div class="vault_confirm_box">
    <div class="vault_confirm_title" id="vault_confirm_title">확인</div>
    <div class="vault_confirm_msg"   id="vault_confirm_msg"></div>
    <div class="vault_confirm_btns">
      <button class="vault_confirm_cancel" id="vault_confirm_cancel">취소</button>
      <button class="vault_confirm_ok"     id="vault_confirm_ok">확인</button>
    </div>
  </div>
</div>

<div class="vault_toast" id="vault_toast"></div>

<script src="app.js"></script>
</body>
</html>
